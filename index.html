<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .container {
    max-width: 400px;
    margin: 0 auto;
    padding: 20px 16px 24px;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 16px;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .card h2 {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6b7084;
    margin-bottom: 10px;
  }

  .field {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .field label {
    font-size: 0.8rem;
    color: #9da0b0;
    width: 100px;
    flex-shrink: 0;
  }

  .field input {
    flex: 1;
    padding: 7px 10px;
    font-size: 16px;
    font-family: inherit;
    background: #12141c;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    color: #fff;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input::placeholder { color: #3e4155; }
  .field input:focus { border-color: #5b8def; }

  /* hide number spinners */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  .stats {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .stat {
    flex: 1;
    background: #12141c;
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }

  .stat-label {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7084;
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .hint {
    font-size: 0.7rem;
    color: #464960;
    margin-top: 4px;
  }

  .lap-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #222531;
  }

  .lap-row:last-child { border-bottom: none; }

  .lap-label {
    font-size: 0.85rem;
    color: #9da0b0;
  }

  .lap-time {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .lap-time.empty { color: #3e4155; }

  .combo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #222531;
    cursor: pointer;
    transition: background-color 0.1s;
  }

  .combo-row:last-child { border-bottom: none; }
  .combo-row:hover { background-color: #222531; }

  .combo-gearing {
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .combo-meta {
    font-size: 0.8rem;
    color: #9da0b0;
    font-variant-numeric: tabular-nums;
  }

  .combo-empty {
    font-size: 0.8rem;
    color: #464960;
    text-align: center;
    padding: 8px 0;
  }

  .input-with-action {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .input-with-action input {
    flex: 1;
    min-width: 0;
  }

  .icon-btn {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #12141c;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    color: #9da0b0;
    cursor: pointer;
    padding: 0;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
  }

  .icon-btn:hover {
    color: #fff;
    border-color: #3e4155;
  }

  .icon-btn[aria-expanded="true"] {
    color: #5b8def;
    border-color: #5b8def;
  }

  .owned-panel {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #222531;
  }

  .disclaimer {
    text-align: center;
    font-size: 0.85rem;
    color: #9da0b0;
    margin-bottom: 8px;
  }

  .disclaimer a {
    color: #5b7aaa;
    text-decoration: none;
  }

  .bmc-wrapper {
    text-align: center;
    margin-top: 4px;
  }

  .bmc-wrapper .bmc-btn {
    transform: scale(0.55);
    transform-origin: center;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Track Calculator</h1>

  <div class="card">
    <h2>Gearing</h2>
    <div class="field">
      <label for="chainring">Chainring</label>
      <input type="number" id="chainring" placeholder="70" min="1">
    </div>
    <div class="field">
      <label for="cog">Cog</label>
      <input type="number" id="cog" placeholder="13" min="1">
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Ratio</div>
        <div class="stat-value" id="ratio">&mdash;</div>
      </div>
      <div class="stat">
        <div class="stat-label">Gear Inches</div>
        <div class="stat-value" id="gear-inches">&mdash;</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Reverse Search</h2>
    <div class="field">
      <label for="target-inches">Target Inches</label>
      <div class="input-with-action">
        <input type="number" id="target-inches" placeholder="90" min="0" step="0.1">
        <button type="button" id="owned-toggle-btn" class="icon-btn" aria-label="Toggle gear options" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="21" x2="4" y2="14"/>
            <line x1="4" y1="10" x2="4" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/>
            <line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1" y1="14" x2="7" y2="14"/>
            <line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="owned-panel" class="owned-panel" hidden>
      <div class="field">
        <label for="owned-chainrings">Chainrings</label>
        <input type="text" id="owned-chainrings" placeholder="e.g. 48-52,55" inputmode="numeric">
      </div>
      <div class="field">
        <label for="owned-cogs">Cogs</label>
        <input type="text" id="owned-cogs" placeholder="e.g. 13-16,18" inputmode="numeric">
      </div>
    </div>
    <div id="combo-list"></div>
    <p class="hint">Tap a row to load it above.</p>
  </div>

  <div class="card">
    <h2>Speed / Cadence</h2>
    <div class="field">
      <label for="cadence">Cadence (rpm)</label>
      <input type="number" id="cadence" placeholder="120" min="0">
    </div>
    <div class="field">
      <label for="speed">Speed (km/h)</label>
      <input type="number" id="speed" placeholder="50.0" min="0" step="0.1">
    </div>
    <p class="hint">Enter either field and the other will calculate.</p>
  </div>

  <div class="card">
    <h2>Lap Times</h2>
    <div class="lap-row">
      <span class="lap-label">200m</span>
      <span class="lap-time empty" id="t200">&mdash;</span>
    </div>
    <div class="lap-row">
      <span class="lap-label">250m</span>
      <span class="lap-time empty" id="t250">&mdash;</span>
    </div>
    <div class="lap-row">
      <span class="lap-label">333m</span>
      <span class="lap-time empty" id="t333">&mdash;</span>
    </div>
  </div>

  <div class="card">
    <p class="disclaimer">Made because <a href="https://trackstarcalculator.com">trackstarcalculator.com</a> was down.</p>
    <div class="bmc-wrapper">
      <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="jakev" data-color="#FFDD00" data-emoji="" data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff"></script>
    </div>
  </div>
</div>

<script>
const WHEEL_CIRC = 2.096;   // meters — 700c x 23mm
const WHEEL_DIAM_IN = 27; // inches — standard for gear inch calculation

const $ = id => document.getElementById(id);

const chainringEl = $('chainring');
const cogEl = $('cog');
const cadenceEl = $('cadence');
const speedEl = $('speed');

let lastEdited = null;

function getGearing() {
  const chainring = parseFloat(chainringEl.value);
  const cog = parseFloat(cogEl.value);
  if (!chainring || !cog || cog === 0) return null;
  const ratio = chainring / cog;
  const dev = ratio * WHEEL_CIRC;
  const gearInches = ratio * WHEEL_DIAM_IN;
  return { ratio, dev, gearInches };
}

function formatTime(seconds) {
  if (!isFinite(seconds) || seconds <= 0) return '\u2014';
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  if (mins > 0) return mins + ':' + secs.toFixed(2).padStart(5, '0');
  return secs.toFixed(2) + 's';
}

function setLap(id, seconds) {
  const el = $(id);
  const text = formatTime(seconds);
  el.textContent = text;
  el.classList.toggle('empty', text === '\u2014');
}

function update(source) {
  const gearing = getGearing();

  if (gearing) {
    $('ratio').textContent = gearing.ratio.toFixed(2);
    $('gear-inches').textContent = gearing.gearInches.toFixed(1) + '"';
  } else {
    $('ratio').textContent = '\u2014';
    $('gear-inches').textContent = '\u2014';
  }

  if (!gearing) {
    setLap('t200', NaN);
    setLap('t250', NaN);
    setLap('t333', NaN);
    return;
  }

  let speedKmh = null;

  if (source === 'cadence' || (source === 'gearing' && lastEdited === 'cadence')) {
    const cadence = parseFloat(cadenceEl.value);
    if (cadence > 0) {
      speedKmh = gearing.dev * cadence * 60 / 1000;
      speedEl.value = speedKmh.toFixed(1);
    } else {
      speedEl.value = '';
    }
  } else if (source === 'speed' || (source === 'gearing' && lastEdited === 'speed')) {
    const sp = parseFloat(speedEl.value);
    if (sp > 0) {
      speedKmh = sp;
      const cadence = sp * 1000 / (gearing.dev * 60);
      cadenceEl.value = Math.round(cadence);
    } else {
      cadenceEl.value = '';
    }
  }

  if (speedKmh && speedKmh > 0) {
    const mps = speedKmh / 3.6;
    setLap('t200', 200 / mps);
    setLap('t250', 250 / mps);
    setLap('t333', 333 / mps);
  } else {
    setLap('t200', NaN);
    setLap('t250', NaN);
    setLap('t333', NaN);
  }
}

cadenceEl.addEventListener('input', () => { lastEdited = 'cadence'; update('cadence'); });
speedEl.addEventListener('input', () => { lastEdited = 'speed'; update('speed'); });
chainringEl.addEventListener('input', () => update('gearing'));
cogEl.addEventListener('input', () => update('gearing'));

const CHAINRING_MIN = 44;
const CHAINRING_MAX = 70;
const COG_MIN = 12;
const COG_MAX = 20;
const NUM_RESULTS = 8;

const targetInchesEl = $('target-inches');
const ownedChainringsEl = $('owned-chainrings');
const ownedCogsEl = $('owned-cogs');
const comboListEl = $('combo-list');

const CHAINRINGS_STORAGE_KEY = 'trackcalc.ownedChainrings';
const COGS_STORAGE_KEY = 'trackcalc.ownedCogs';

function parseList(text) {
  if (!text) return null;
  const set = new Set();
  for (const part of text.split(',')) {
    const trimmed = part.trim();
    if (!trimmed) continue;
    const range = trimmed.match(/^(\d+)\s*-\s*(\d+)$/);
    if (range) {
      const a = parseInt(range[1], 10);
      const b = parseInt(range[2], 10);
      const lo = Math.min(a, b);
      const hi = Math.max(a, b);
      for (let i = lo; i <= hi; i++) set.add(i);
    } else if (/^\d+$/.test(trimmed)) {
      set.add(parseInt(trimmed, 10));
    } else {
      return null;
    }
  }
  if (set.size === 0) return null;
  return [...set].sort((a, b) => a - b);
}

function rangeList(min, max) {
  const list = [];
  for (let i = min; i <= max; i++) list.push(i);
  return list;
}

function renderCombos() {
  const target = parseFloat(targetInchesEl.value);
  comboListEl.innerHTML = '';

  if (!target || target <= 0) {
    comboListEl.innerHTML = '<p class="combo-empty">&mdash;</p>';
    return;
  }

  const chainrings = parseList(ownedChainringsEl.value) || rangeList(CHAINRING_MIN, CHAINRING_MAX);
  const cogs = parseList(ownedCogsEl.value) || rangeList(COG_MIN, COG_MAX);
  const combos = [];
  for (const c of chainrings) {
    for (const g of cogs) {
      if (g <= 0) continue;
      const inches = (c / g) * WHEEL_DIAM_IN;
      combos.push({ chainring: c, cog: g, inches, diff: Math.abs(inches - target) });
    }
  }

  combos.sort((a, b) => a.diff - b.diff);
  const seen = new Set();
  const top = [];
  for (const combo of combos) {
    const key = combo.inches.toFixed(2);
    if (seen.has(key)) continue;
    seen.add(key);
    top.push(combo);
    if (top.length >= NUM_RESULTS) break;
  }

  for (const combo of top) {
    const row = document.createElement('div');
    row.className = 'combo-row';
    const left = document.createElement('span');
    left.className = 'combo-gearing';
    left.textContent = combo.chainring + ' \u00d7 ' + combo.cog;
    const right = document.createElement('span');
    right.className = 'combo-meta';
    const delta = combo.inches - target;
    const sign = delta >= 0 ? '+' : '\u2212';
    right.textContent = combo.inches.toFixed(1) + '"  (' + sign + Math.abs(delta).toFixed(1) + ')';
    row.appendChild(left);
    row.appendChild(right);
    row.addEventListener('click', () => {
      chainringEl.value = combo.chainring;
      cogEl.value = combo.cog;
      update('gearing');
    });
    comboListEl.appendChild(row);
  }
}

targetInchesEl.addEventListener('input', renderCombos);

function bindPersisted(el, key) {
  el.addEventListener('input', () => {
    try { localStorage.setItem(key, el.value); } catch (e) {}
    renderCombos();
  });
  try {
    const saved = localStorage.getItem(key);
    if (saved) el.value = saved;
  } catch (e) {}
}

bindPersisted(ownedChainringsEl, CHAINRINGS_STORAGE_KEY);
bindPersisted(ownedCogsEl, COGS_STORAGE_KEY);

const ownedToggleBtn = $('owned-toggle-btn');
const ownedPanel = $('owned-panel');

function setOwnedOpen(open) {
  ownedPanel.hidden = !open;
  ownedToggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
}

ownedToggleBtn.addEventListener('click', () => {
  setOwnedOpen(ownedPanel.hidden);
});

if (ownedChainringsEl.value || ownedCogsEl.value) setOwnedOpen(true);

renderCombos();
</script>

</body>
</html>
